<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HELMA Viewer</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    #helma-player-page {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000;
      overflow: hidden;
    }

    #helma-player-frame {
      width: 960px;
      height: 540px;
      transform-origin: center center;
    }

    #helma-stage {
      position: relative;
      width: 960px;
      height: 540px;
      overflow: hidden;
      background: #fff;
    }

    .helma-stage-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      pointer-events: none;
    }

    .helma-el {
      position: absolute;
      z-index: 2;
      min-width: 24px;
      min-height: 24px;
      padding: 5px;
      white-space: pre-wrap;
      line-height: 1.2;
      overflow: hidden;
    }

    .helma-el.image {
      padding: 0;
      background-position: center;
      background-repeat: no-repeat;
      background-size: 100% 100%;
    }

    .helma-status {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      color: #687483;
      background: #fff;
      text-align: center;
      font-size: 28px;
      padding: 40px;
    }

    .helma-weather-box {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .helma-weather-icon {
      font-size: 1.6em;
      line-height: 1;
    }

    .helma-weather-temp {
      font-weight: 700;
      margin-top: 0.12em;
    }

    .helma-weather-place {
      font-size: 0.55em;
      opacity: 0.75;
      margin-top: 0.2em;
    }
  </style>
</head>
<body>
  <div id="helma-player-page">
    <div id="helma-player-frame">
      <div id="helma-stage">
        <div class="helma-status">Laster HELMA...</div>
      </div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script>
  (function () {
    "use strict";

    const VERSION = "5.1-viewer";
    const API_URL = window.HELMA_API_URL || "";
    const API_TOKEN = window.HELMA_API_TOKEN || "";
    const BRANDING_IMAGE = window.HELMA_BRANDING_IMAGE || "";
    const POLL_MS = Number(window.HELMA_POLL_MS) || 10000;
    const CANVAS_WIDTH = 960;
    const CANVAS_HEIGHT = 540;

    const state = {
      slides: [],
      currentIndex: 0,
      playerTimer: null,
      clockTimer: null,
      pollTimer: null,
      remoteSignature: "",
      weatherCache: {}
    };

    const frame = document.getElementById("helma-player-frame");
    const stage = document.getElementById("helma-stage");

    function headers() {
      const result = {};
      if (API_TOKEN) result.Authorization = "Bearer " + API_TOKEN;
      return result;
    }

    function loadRemoteSlides(force) {
      if (!API_URL) {
        renderStatus("Mangler HELMA_API_URL");
        return Promise.resolve(false);
      }

      const separator = API_URL.includes("?") ? "&" : "?";
      return fetch(API_URL + separator + "t=" + Date.now(), { headers: headers() })
        .then(response => {
          if (!response.ok) throw new Error("Remote load failed: " + response.status);
          return response.json();
        })
        .then(payload => {
          const remoteSlides = Array.isArray(payload) ? payload : payload && payload.data;
          if (!Array.isArray(remoteSlides)) throw new Error("Remote payload must be an array or { data: [] }");

          const updated = Number(payload && payload.updated) || 0;
          const signature = makeSignature(remoteSlides, updated);
          if (!force && signature === state.remoteSignature) return false;

          state.slides = normalizeSlides(remoteSlides);
          state.remoteSignature = signature;
          return true;
        })
        .catch(err => {
          console.warn("HELMA viewer: remote load failed", err);
          if (!state.slides.length) renderStatus("Kunne ikke laste infoskjermen.");
          return false;
        });
    }

    function normalizeSlides(slides) {
      return slides.map((slide, index) => ({
        id: slide.id || "slide_" + index,
        name: slide.name || "Slide " + (index + 1),
        active: slide.active !== false,
        duration: Math.max(3, parseInt(slide.duration, 10) || 8),
        background: slide.background || "#ffffff",
        backgroundImage: slide.backgroundImage || null,
        bgOpacity: slide.bgOpacity === undefined ? 1 : Number(slide.bgOpacity),
        elements: Array.isArray(slide.elements) ? slide.elements.map(normalizeElement) : []
      }));
    }

    function normalizeElement(el) {
      return {
        id: el.id || "el_" + Math.random().toString(36).slice(2),
        type: el.type || "text",
        content: el.content || "",
        src: el.src || "",
        place: el.place || "",
        lat: el.lat || "",
        lon: el.lon || "",
        x: Number(el.x) || 0,
        y: Number(el.y) || 0,
        width: Math.max(24, Number(el.width) || 240),
        height: Math.max(24, Number(el.height) || 80),
        style: Object.assign({
          fontSize: "30px",
          fontFamily: "Arial",
          color: "#000000",
          textAlign: "left"
        }, el.style || {})
      };
    }

    function renderSlide(index) {
      const activeSlides = state.slides.filter(slide => slide.active !== false);
      if (!activeSlides.length) {
        renderStatus("Ingen aktive slides.");
        return;
      }

      if (state.clockTimer) clearInterval(state.clockTimer);
      const slide = activeSlides[index % activeSlides.length];
      stage.innerHTML = "";
      stage.style.backgroundColor = slide.background || "#ffffff";

      const bg = document.createElement("div");
      bg.className = "helma-stage-bg";
      if (slide.backgroundImage) {
        bg.style.backgroundImage = "url('" + cssUrl(slide.backgroundImage) + "')";
        bg.style.opacity = slide.bgOpacity === undefined ? "1" : String(slide.bgOpacity);
      } else if (isWhite(slide.background) && BRANDING_IMAGE) {
        bg.style.backgroundImage = "url('" + cssUrl(BRANDING_IMAGE) + "')";
        bg.style.opacity = "1";
      }
      stage.appendChild(bg);

      slide.elements.forEach(el => stage.appendChild(renderElement(el)));

      state.clockTimer = setInterval(() => {
        document.querySelectorAll(".helma-el[data-type='clock']").forEach(node => {
          node.textContent = formatNorwegianTime();
        });
      }, 1000);

      clearTimeout(state.playerTimer);
      state.playerTimer = setTimeout(() => {
        state.currentIndex = (index + 1) % activeSlides.length;
        renderSlide(state.currentIndex);
      }, slide.duration * 1000);
    }

    function renderElement(el) {
      const node = document.createElement("div");
      node.className = "helma-el " + el.type;
      node.dataset.id = el.id;
      node.dataset.type = el.type;
      node.style.left = el.x + "px";
      node.style.top = el.y + "px";
      node.style.width = el.width + "px";
      node.style.height = el.height + "px";

      const s = el.style || {};
      node.style.fontSize = s.fontSize || "30px";
      node.style.fontFamily = s.fontFamily || "Arial";
      node.style.color = s.color || "#000000";
      node.style.textAlign = s.textAlign || "left";

      if (el.type === "image") {
        node.style.backgroundImage = "url('" + cssUrl(el.src) + "')";
      } else if (el.type === "clock") {
        node.textContent = formatNorwegianTime();
      } else if (el.type === "weather") {
        node.innerHTML = "<div class=\"helma-weather-box\">Laster vær...</div>";
        fetchWeather(el, node);
      } else {
        node.textContent = el.content || "";
      }

      return node;
    }

    function fetchWeather(el, node) {
      if (!el.lat || !el.lon) {
        node.innerHTML = "<div class=\"helma-weather-box\">Mangler posisjon</div>";
        return;
      }

      const key = "weather:" + el.lat + ":" + el.lon;
      const cached = state.weatherCache[key];
      if (cached && Date.now() - cached.time < 30 * 60 * 1000) {
        renderWeather(node, cached.data, el.place);
        return;
      }

      const url = "https://api.open-meteo.com/v1/forecast?latitude=" + encodeURIComponent(el.lat) +
        "&longitude=" + encodeURIComponent(el.lon) +
        "&current=temperature_2m,weather_code";

      fetch(url)
        .then(response => response.json())
        .then(data => {
          state.weatherCache[key] = { time: Date.now(), data };
          renderWeather(node, data, el.place);
        })
        .catch(() => {
          node.innerHTML = "<div class=\"helma-weather-box\">Værfeil</div>";
        });
    }

    function renderWeather(node, data, place) {
      const temp = data && data.current ? Math.round(data.current.temperature_2m) : null;
      const code = data && data.current ? data.current.weather_code : 0;
      node.innerHTML = `
        <div class="helma-weather-box">
          <div class="helma-weather-icon">${weatherSymbol(code)}</div>
          <div class="helma-weather-temp">${temp === null ? "-" : temp + "°"}</div>
          <div class="helma-weather-place">${escapeHtml(place || "")}</div>
        </div>
      `;
    }

    function renderStatus(message) {
      stage.innerHTML = "<div class=\"helma-status\">" + escapeHtml(message) + "</div>";
    }

    function startPolling() {
      if (state.pollTimer) clearInterval(state.pollTimer);
      state.pollTimer = setInterval(() => {
        loadRemoteSlides(false).then(changed => {
          if (!changed) return;
          state.currentIndex = 0;
          renderSlide(0);
        });
      }, POLL_MS);
    }

    function fitFrame() {
      const scale = Math.min(window.innerWidth / CANVAS_WIDTH, window.innerHeight / CANVAS_HEIGHT);
      frame.style.transform = "scale(" + scale + ")";
    }

    function formatNorwegianTime() {
      const now = new Date();
      const d = String(now.getDate()).padStart(2, "0");
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const y = now.getFullYear();
      const h = String(now.getHours()).padStart(2, "0");
      const min = String(now.getMinutes()).padStart(2, "0");
      return d + "." + m + "." + y + " " + h + ":" + min;
    }

    function makeSignature(slides, updated) {
      return String(updated || "") + ":" + JSON.stringify(slides || []);
    }

    function weatherSymbol(code) {
      if ([0, 1].includes(code)) return "☀";
      if ([2, 3].includes(code)) return "☁";
      if ([45, 48].includes(code)) return "≋";
      if ([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return "☂";
      if ([71, 73, 75, 77, 85, 86].includes(code)) return "❄";
      if ([95, 96, 99].includes(code)) return "⚡";
      return "☁";
    }

    function isWhite(color) {
      return !color || color.toLowerCase() === "#ffffff" || color.toLowerCase() === "#fff";
    }

    function cssUrl(value) {
      return String(value || "").replace(/['"\\]/g, "");
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    window.addEventListener("resize", fitFrame);
    fitFrame();
    loadRemoteSlides(true).then(() => {
      if (state.slides.length) renderSlide(0);
      startPolling();
    });
  })();
  </script>
</body>
</html>
